<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Касса</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial;margin:0;padding:12px;background:#f5f5f5}
    h3{margin:12px 0 6px;font-size:18px}
    table{width:100%;border-collapse:collapse;font-size:14px;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.1)}
    th,td{padding:8px 10px;text-align:left}
    th{background:#fafafa;color:#555}
    tr+tr{border-top:1px solid #eaeaea}
    .expense{color:#e53935}
    .income{color:#43a047}
  </style>
</head>
<body>

<h3>Расход</h3>
<table id="expense"><thead><tr><th>Дата</th><th>Сумма</th><th>Описание</th></tr></thead><tbody></tbody></table>

<h3>Приход</h3>
<table id="income"><thead><tr><th>Дата</th><th>Сумма</th><th>Описание</th></tr></thead><tbody></tbody></table>

<script>
  // 1. Поддержка Telegram WebApp (раскрываем на весь экран)
  const tg = window.Telegram.WebApp;
  tg.expand();

  // 2. Загружаем данные
  fetch('data.json')
    .then(r => r.json())
    .then(drawTables)
    .catch(err => alert('Ошибка загрузки: ' + err));

  // 3. Рисуем таблицы
  function drawTables(list) {
    const expBody = document.querySelector('#expense tbody');
    const incBody = document.querySelector('#income tbody');

    list.sort((a, b) => new Date(b.date) - new Date(a.date));

    list.forEach(item => {
      const row = `<tr>
        <td>${new Date(item.date).toLocaleDateString('ru-RU')}</td>
        <td class="${item.type}">${item.amount.toLocaleString('ru')} ₽</td>
        <td>${item.desc}</td>
      </tr>`;
      item.type === 'expense'
        ? expBody.insertAdjacentHTML('beforeend', row)
        : incBody.insertAdjacentHTML('beforeend', row);
    });
  }
</script>
</body>
</html>
