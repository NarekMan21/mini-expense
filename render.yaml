services:
  - type: web
    name: telegram-cash-app
    runtime: python3
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: API_ID
        value: "20517386"
      - key: API_HASH
        value: "73457be44439ae991e7ba2bf97820a31"
      - key: PHONE
        value: "+79281307511"
      - key: GROUP_EXP
        value: "-4731002756"
      - key: GROUP_INC
        value: "-4829787389"
      - key: SESSION_FILE
        value: "render.session"  # отдельная сессия для Render
      - key: SKIP_AUTH
        value: "true"  # пропускаем авторизацию на Render